<!doctype html>
<html lang="es" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>DriveIQ — Iniciar sesión</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="styles.css?v=5.0">
<style>
  body { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #f4f6f9; }
  .login-card { width: 100%; max-width: 420px; background: #ffffff; border: 1px solid #e2e8f0; border-radius: 16px; padding: 36px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
  .brand-row { display: flex; align-items: center; gap: 14px; margin-bottom: 28px; }
  .brand-icon { width: 52px; height: 52px; border-radius: 14px; background: linear-gradient(135deg, #F97316, #D97706); display: flex; align-items: center; justify-content: center; box-shadow: 0 6px 20px rgba(249,115,22,0.35); flex-shrink: 0; overflow: hidden; }
  .brand-icon img { width: 100%; height: 100%; object-fit: contain; border-radius: inherit; }
  .brand-name { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; color: #111827; }
  .brand-sub { font-size: 12px; color: #6b7280; margin-top: 1px; }
  .field-label { display: block; font-size: 11px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; color: #6b7280; margin-bottom: 6px; }
  .field-input { width: 100%; background: #f8fafc; border: 1.5px solid #e2e8f0; border-radius: 8px; color: #111827; font-size: 14px; padding: 10px 14px; outline: none; transition: border-color .15s; box-sizing: border-box; }
  .field-input:focus { border-color: #F97316; }
  .field-input::placeholder { color: #9ca3af; }
  .btn-login { background: #F97316; color: #fff; border: none; border-radius: 8px; padding: 11px 20px; font-size: 14px; font-weight: 600; cursor: pointer; width: 100%; transition: opacity .15s; }
  .btn-login:hover { opacity: .88; }
  .btn-login:disabled { opacity: 0.5; cursor: not-allowed; }
  #errMsg { display: none; color: #dc2626; font-size: 12px; margin-top: 6px; }
</style>
</head>
<body>
<div class="login-card">
  <div class="brand-row">
    <div class="brand-icon">
      <img src="assets/driveiq-icon.svg" alt="DriveIQ">
    </div>
    <div>
      <div class="brand-name">DriveIQ</div>
      <div class="brand-sub">Driving Intelligence &amp; Performance Analytics</div>
    </div>
  </div>
  <form id="loginForm" autocomplete="on">
    <div class="mb-3">
      <label class="field-label" for="email">Correo electrónico</label>
      <input type="email" class="field-input" id="email" name="email" placeholder="usuario@empresa.com" required autocomplete="email">
    </div>
    <div class="mb-3">
      <label class="field-label" for="password">Contraseña</label>
      <input type="password" class="field-input" id="password" name="password" placeholder="••••••••" required autocomplete="current-password">
    </div>
    <div id="errMsg"></div>
    <button type="submit" class="btn-login mt-3" id="btnLogin">Ingresar</button>
  </form>
</div>
<script>
(function(){
  var t = localStorage.getItem('driveiq_theme') || 'light';
  document.documentElement.setAttribute('data-theme', t);
})();

// Si ya hay token guardado, ir directo al dashboard
var saved = localStorage.getItem('driveiq_token');
if (saved) { window.location.replace('/?' + 'token=' + encodeURIComponent(saved)); }

function getApiBase() {
  var h = window.location.hostname;
  if (h === 'localhost' || h === '127.0.0.1') return 'http://localhost:4010/api';
  return window.location.protocol + '//' + h + '/api';
}

document.getElementById('loginForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  var btn = document.getElementById('btnLogin');
  var errMsg = document.getElementById('errMsg');
  var email = document.getElementById('email').value.trim();
  var password = document.getElementById('password').value;

  btn.disabled = true;
  btn.textContent = 'Verificando...';
  errMsg.style.display = 'none';

  try {
    var r = await fetch(getApiBase() + '/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    var data = await r.json();
    if (data.status === 'ok' && data.token) {
      localStorage.setItem('driveiq_token', data.token);
      window.location.replace('/?' + 'token=' + encodeURIComponent(data.token));
    } else {
      errMsg.textContent = data.error || 'Credenciales incorrectas. Verifique su email y contraseña.';
      errMsg.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Ingresar';
    }
  } catch(err) {
    errMsg.textContent = 'Error de conexión. Intente nuevamente.';
    errMsg.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Ingresar';
  }
});
</script>
</body>
</html>
