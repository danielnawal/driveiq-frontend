server {
    listen       80;
    listen  [::]:80;
    server_name  localhost;

    # SSO desde GPSwox launcher
    location = /auth {
        proxy_pass http://driveiq-api:3100/auth;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # API DriveIQ — proxy al backend Node.js
    location /api/ {
        proxy_pass http://driveiq-api:3100/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # App móvil - proxy API (evita CORS)
    location /mobile/api/ {
        proxy_pass http://driveiq-api:3100/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
        add_header Access-Control-Allow-Headers "Content-Type, Authorization";
    }

    # App móvil SPA
    location /mobile/ {
        alias  /usr/share/nginx/html/mobile/;
        index  index.html;
        try_files $uri $uri/ /mobile/index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Descarga APK DriveIQ
    location = /driveiq-latest.apk {
        root   /usr/share/nginx/html;
        add_header Content-Type "application/vnd.android.package-archive";
        add_header Content-Disposition "attachment; filename=\"DriveIQ.apk\"";
        add_header Cache-Control "no-store";
    }

    # App web principal DriveIQ
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    location ~* \.(js|css)$ {
        root   /usr/share/nginx/html;
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
    }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}
